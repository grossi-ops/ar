<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock - Multiple Time Zones</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 3rem;
      font-size: 2.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .clocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .clock-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .clock-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .timezone-name {
      font-size: 1.2rem;
      color: #64b5f6;
      margin-bottom: 0.5rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .time-display {
      font-size: 3rem;
      color: #fff;
      font-weight: bold;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .date-display {
      font-size: 0.9rem;
      color: #b0bec5;
      margin-bottom: 1rem;
    }

    .time-info {
      display: flex;
      justify-content: space-around;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .info-item {
      flex: 1;
    }

    .info-label {
      font-size: 0.75rem;
      color: #90caf9;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 1.1rem;
      color: #fff;
      font-weight: bold;
    }

    .controls {
      text-align: center;
      margin-bottom: 2rem;
    }

    .btn {
      background: rgba(100, 181, 246, 0.8);
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      margin: 0.5rem;
      transition: background 0.3s ease, transform 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .btn:hover {
      background: rgba(100, 181, 246, 1);
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .toggle-btn {
      background: rgba(76, 175, 80, 0.8);
    }

    .toggle-btn:hover {
      background: rgba(76, 175, 80, 1);
    }

    .footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      margin-top: 2rem;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49% {
        opacity: 1;
      }
      50%, 100% {
        opacity: 0.3;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
        margin-bottom: 2rem;
      }

      .time-display {
        font-size: 2rem;
      }

      .clocks-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⌚ Global Time Zones</h1>
    
    <div class="controls">
      <button class="btn" onclick="toggle24Hour()">Toggle 24H / 12H</button>
      <button class="btn toggle-btn" onclick="addTimezone()">+ Add Timezone</button>
      <button class="btn" onclick="reset()">Reset</button>
    </div>

    <div class="clocks-grid" id="clocksGrid"></div>

    <div class="footer">
      <p>Updated every second • Click a clock to remove it</p>
    </div>
  </div>

  <script>
    const DEFAULT_TIMEZONES = [
      { name: 'New York', timezone: 'America/New_York' },
      { name: 'London', timezone: 'Europe/London' },
      { name: 'Tokyo', timezone: 'Asia/Tokyo' },
      { name: 'Sydney', timezone: 'Australia/Sydney' },
      { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
      { name: 'Dubai', timezone: 'Asia/Dubai' }
    ];

    const ALL_TIMEZONES = [
      // North America
      { name: 'Los Angeles', timezone: 'America/Los_Angeles' },
      { name: 'Denver', timezone: 'America/Denver' },
      { name: 'Chicago', timezone: 'America/Chicago' },
      { name: 'New York', timezone: 'America/New_York' },
      { name: 'Toronto', timezone: 'America/Toronto' },
      // South America
      { name: 'Mexico City', timezone: 'America/Mexico_City' },
      { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
      { name: 'Buenos Aires', timezone: 'America/Argentina/Buenos_Aires' },
      // Europe
      { name: 'London', timezone: 'Europe/London' },
      { name: 'Paris', timezone: 'Europe/Paris' },
      { name: 'Berlin', timezone: 'Europe/Berlin' },
      { name: 'Moscow', timezone: 'Europe/Moscow' },
      // Middle East & Africa
      { name: 'Cairo', timezone: 'Africa/Cairo' },
      { name: 'Dubai', timezone: 'Asia/Dubai' },
      { name: 'Johannesburg', timezone: 'Africa/Johannesburg' },
      // Asia
      { name: 'Bangkok', timezone: 'Asia/Bangkok' },
      { name: 'Hong Kong', timezone: 'Asia/Hong_Kong' },
      { name: 'Shanghai', timezone: 'Asia/Shanghai' },
      { name: 'Tokyo', timezone: 'Asia/Tokyo' },
      { name: 'Seoul', timezone: 'Asia/Seoul' },
      { name: 'Singapore', timezone: 'Asia/Singapore' },
      { name: 'Mumbai', timezone: 'Asia/Kolkata' },
      { name: 'Jakarta', timezone: 'Asia/Jakarta' },
      // Oceania
      { name: 'Sydney', timezone: 'Australia/Sydney' },
      { name: 'Melbourne', timezone: 'Australia/Melbourne' },
      { name: 'Auckland', timezone: 'Pacific/Auckland' },
      // UTC
      { name: 'UTC', timezone: 'UTC' }
    ];

    let currentTimezones = DEFAULT_TIMEZONES.slice();
    let use24Hour = true;

    function updateClocks() {
      const grid = document.getElementById('clocksGrid');
      grid.innerHTML = '';

      currentTimezones.forEach((tz, index) => {
        const formatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tz.timezone,
          hour: use24Hour ? '2-digit' : '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: !use24Hour
        });

        const dateFormatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tz.timezone,
          weekday: 'short',
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });

        const now = new Date();
        const timeStr = formatter.format(now);
        const dateStr = dateFormatter.format(now);

        // Get UTC offset
        const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
        const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz.timezone }));
        const offset = (tzDate - utcDate) / (1000 * 60 * 60);
        const offsetStr = `UTC${offset >= 0 ? '+' : ''}${offset}`;

        // Get day of week
        const dayFormatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tz.timezone,
          weekday: 'long'
        });
        const dayOfWeek = dayFormatter.format(now);

        const card = document.createElement('div');
        card.className = 'clock-card';
        card.onclick = () => removeTimezone(index);
        card.style.cursor = 'pointer';

        card.innerHTML = `
          <div class="timezone-name">${tz.name}</div>
          <div class="time-display">${timeStr}</div>
          <div class="date-display">${dateStr}</div>
          <div class="time-info">
            <div class="info-item">
              <div class="info-label">Offset</div>
              <div class="info-value">${offsetStr}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Day</div>
              <div class="info-value">${dayOfWeek.slice(0, 3)}</div>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function toggle24Hour() {
      use24Hour = !use24Hour;
      updateClocks();
    }

    function addTimezone() {
      const available = ALL_TIMEZONES.filter(
        tz => !currentTimezones.some(ct => ct.timezone === tz.timezone)
      );

      if (available.length === 0) {
        alert('All timezones are already added!');
        return;
      }

      const names = available.map(tz => `${tz.name} (${tz.timezone})`).join('\n');
      const selected = prompt(
        `Select a timezone to add:\n\n${names}\n\nEnter the timezone name:`,
        available[0].name
      );

      if (selected) {
        const found = available.find(tz => tz.name === selected || tz.timezone === selected);
        if (found && !currentTimezones.some(ct => ct.timezone === found.timezone)) {
          currentTimezones.push(found);
          updateClocks();
        } else {
          alert('Timezone not found or already added!');
        }
      }
    }

    function removeTimezone(index) {
      if (confirm(`Remove ${currentTimezones[index].name}?`)) {
        currentTimezones.splice(index, 1);
        updateClocks();
      }
    }

    function reset() {
      if (confirm('Reset to default timezones?')) {
        currentTimezones = DEFAULT_TIMEZONES.slice();
        use24Hour = true;
        updateClocks();
      }
    }

    // Update clocks every second
    updateClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
